<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octane – Confirm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { width: 360px; min-height: 280px; padding: 20px; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .confirm-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .confirm-header h2 { margin: 0; font-size: 16px; font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--fg); }
    .origin-badge {
      background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px;
      padding: 8px 12px; font-size: 12px; color: var(--fg-2); margin-bottom: 12px;
      word-break: break-all;
    }
    .confirm-details {
      background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px;
      padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.6;
    }
    .confirm-details .label { color: var(--fg-3); }
    .confirm-details .value { color: var(--fg); word-break: break-all; }
    .confirm-details .row { margin-bottom: 6px; }
    .confirm-details .message-preview {
      max-height: 80px; overflow-y: auto; white-space: pre-wrap;
      background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; padding: 8px; margin-top: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--fg-2);
    }
    .btn-row { display: flex; gap: 10px; }
    .btn-row button { flex: 1; padding: 11px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; }
    .btn-approve { background: var(--accent); color: var(--accent-fg); }
    .btn-approve:hover { background: #5b8af0; }
    .btn-reject { background: var(--bg-2); color: var(--fg); border: 1px solid var(--line); }
    .btn-reject:hover { background: var(--line); }
    .warn { color: #f5a623; font-size: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="confirm-header">
    <h2 id="title">Confirm Action</h2>
  </div>
  <div class="origin-badge" id="origin"></div>
  <div class="confirm-details" id="details"></div>
  <div class="warn" id="warning"></div>
  <div class="btn-row">
    <button class="btn-reject" id="btn-reject">Reject</button>
    <button class="btn-approve" id="btn-approve">Approve</button>
  </div>
  <script type="module" src="confirm.ts"></script>
</body>
</html>
