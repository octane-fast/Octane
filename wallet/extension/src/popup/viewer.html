<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Viewer</title>
  <style>
    :root {
      --bg: #060d1f;
      --bg-1: #1e1e22;
      --bg-2: #26262a;
      --border: #3c3c48;
      --fg: #f6f6f9;
      --fg-2: #a6a6b2;
      --fg-3: #787884;
      --accent: #2662e7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .viewer-header {
      width: 100%;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-1);
    }
    .viewer-header .back-btn {
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--fg-2);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .viewer-header .back-btn:hover { color: var(--fg); border-color: var(--fg-3); }
    .viewer-header .col-name { font-size: 14px; font-weight: 600; }
    .viewer-header .token-id { font-size: 12px; color: var(--fg-3); }
    .viewer-body {
      max-width: 680px;
      width: 100%;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .viewer-image-wrap {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-1);
    }
    .viewer-image-wrap img {
      width: 100%;
      display: block;
    }
    .viewer-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .viewer-title { font-size: 22px; font-weight: 700; }
    .viewer-desc { font-size: 14px; color: var(--fg-2); line-height: 1.6; }
    .viewer-attrs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .viewer-attr {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .viewer-attr-type { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.05em; }
    .viewer-attr-value { font-size: 13px; font-weight: 600; }
    .viewer-meta {
      font-size: 12px;
      color: var(--fg-3);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
      padding: 12px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .viewer-meta summary { cursor: pointer; color: var(--fg-2); }
    .viewer-loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--fg-3);
      font-size: 14px;
    }
    .viewer-error {
      text-align: center;
      padding: 80px 24px;
      color: #fb7777;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="viewer-root">
    <p class="viewer-loading">Loading NFT…</p>
  </div>
  <script type="module" src="viewer.ts"></script>
</body>
</html>
