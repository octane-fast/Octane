<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octane — Private Payments on Octra</title>
  <link rel="icon" type="image/svg+xml" href="./flame.svg">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e8ecff;
      -webkit-font-smoothing: antialiased;
      background: url('./background.png') center / cover no-repeat fixed;
    }

    /* ── Navigation ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 10, 0.4);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #e8ecff;
    }
    .nav-logo img { width: 28px; height: 28px; border-radius: 6px; }
    .nav-logo span {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      color: #fff;
    }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a {
      color: #c8cee8;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #fff; }
    .nav-cta {
      background: linear-gradient(135deg, #0000DB, #3a0ca3);
      color: #fff !important;
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 600 !important;
      transition: all 0.2s !important;
      box-shadow: 0 2px 12px rgba(0, 0, 219, 0.25);
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0, 0, 219, 0.4); }

    /* ── Hero ── */
    .hero {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }
    .logo-container {
      width: 120px;
      height: 120px;
      margin-bottom: 40px;
    }
    .logo-container img {
      width: 100%;
      height: 100%;
    }
    .hero-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 6px;
      color: #fff;
      margin-bottom: 16px;
    }
    .hero-sub {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: #d0d6f0;
      line-height: 1.8;
      max-width: 520px;
      margin: 0 auto 40px;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.7);
    }
    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0000DB, #3a0ca3);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 219, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 219, 0.45);
    }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.06);
      color: #c8cee8;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .btn-ghost:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 640px) {
      .hero-title { font-size: 2rem; letter-spacing: 2px; }
      .hero-sub { font-size: 0.75rem; }
      nav { padding: 12px 16px; }
      .nav-links { gap: 16px; }
      .nav-links a:not(.nav-cta) { display: none; }
      .logo-container { width: 90px; height: 90px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="./">
      <img src="./file.svg" alt="Octane">
      <span>OCTANE</span>
    </a>
    <div class="nav-links">
      <a href="/docs/">API Docs</a>
      <a href="https://octane-fast.github.io/octane-accelerator/">Accelerator</a>
      <a href="https://github.com/octane-fast" target="_blank">GitHub</a>
      <a href="https://x.com/octane__fast" target="_blank">X</a>
      <a class="nav-cta" href="https://chromewebstore.google.com/detail/octane-wallet/lmijanfaogfbimjlkajaphkiegmpmkid" target="_blank">Get Octane Wallet</a>
    </div>
  </nav>

  <section class="hero">
    <div class="logo-container">
      <img src="./flame.svg" alt="Octane">
    </div>
    <h1 class="hero-title">OCTANE</h1>
    <p class="hero-sub">
      The fastest way to transact on Octra. Private transfers in under 30 seconds.
    </p>
    <div class="hero-actions">
      <a class="btn btn-primary" href="https://chromewebstore.google.com/detail/octane-wallet/lmijanfaogfbimjlkajaphkiegmpmkid" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Get Octane Wallet
      </a>
      <a class="btn btn-ghost" href="/docs/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        Read the Docs
      </a>
      <a class="btn btn-ghost" href="https://octane-fast.github.io/octane-accelerator/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Install Accelerator
      </a>
    </div>
  </section>
</body>
</html>
