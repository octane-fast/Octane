<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octra Faucet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d12; color: #e4e4e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { max-width: 420px; width: 100%; }
    h1 { font-size: 28px; margin-bottom: 6px; text-align: center; }
    .subtitle { color: #a1a1aa; font-size: 14px; margin-bottom: 32px; text-align: center; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; }
    .step { margin-bottom: 20px; }
    .step:last-child { margin-bottom: 0; }
    .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; background: #27272a; color: #a1a1aa; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .step-num.active { background: #6366f1; color: #fff; }
    .step-num.done { background: #16a34a; color: #fff; }
    .step-title { font-size: 14px; font-weight: 500; }
    .step-desc { font-size: 13px; color: #71717a; margin-left: 34px; margin-bottom: 8px; }
    button { padding: 10px 20px; border: none; border-radius: 8px; background: #6366f1; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; width: 100%; margin-top: 8px; }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
    .status.error { display: block; background: #1c1017; border: 1px solid #dc2626; color: #f87171; }
    .status.success { display: block; background: #0f1c14; border: 1px solid #16a34a; color: #4ade80; }
    .status.info { display: block; background: #111827; border: 1px solid #3b82f6; color: #93c5fd; }
    .address { font-family: 'SF Mono', monospace; font-size: 12px; color: #a1a1aa; word-break: break-all; margin-left: 34px; margin-top: 4px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #6366f1; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #818cf8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💧 Octra Faucet</h1>
    <p class="subtitle">Get 3 OCT for testing. Requires the Octane wallet.</p>

    <div class="card">
      <div class="step">
        <div class="step-header">
          <div class="step-num" id="step1-num">1</div>
          <span class="step-title">Connect Wallet</span>
        </div>
        <p class="step-desc">Connect your Octane wallet to identify your address.</p>
        <div style="margin-left: 34px;">
          <button id="btn-connect">Connect Wallet</button>
        </div>
        <div class="address" id="user-address" style="display:none"></div>
      </div>

      <div class="step">
        <div class="step-header">
          <div class="step-num" id="step2-num">2</div>
          <span class="step-title">Prove Wallet Ownership</span>
        </div>
        <p class="step-desc">Sign a challenge message to prove you control this address.</p>
        <div style="margin-left: 34px;">
          <button id="btn-claim" disabled>Claim 3 OCT</button>
        </div>
      </div>

      <div id="result" class="status"></div>
    </div>
  </div>

  <script>
    const FAUCET_API = 'https://faucet.octane.systems'; // Production
    // const FAUCET_API = 'http://localhost:3939'; // Local dev

    let userAddress = null;

    function setStatus(msg, type) {
      const el = document.getElementById('result');
      el.className = 'status ' + type;
      el.innerHTML = msg;
    }

    function setStep(num, state) {
      const el = document.getElementById('step' + num + '-num');
      el.className = 'step-num ' + state;
    }

    async function call(method, params) {
      if (!window.octra) throw new Error('Octra wallet not detected. Please install the Octane wallet extension.');
      return window.octra.request({ method, params });
    }

    document.getElementById('btn-connect').addEventListener('click', async () => {
      try {
        const accounts = await call('octra_requestAccounts');
        userAddress = accounts[0];
        document.getElementById('user-address').textContent = userAddress;
        document.getElementById('user-address').style.display = 'block';
        document.getElementById('btn-connect').textContent = 'Connected ✓';
        document.getElementById('btn-connect').disabled = true;
        document.getElementById('btn-claim').disabled = false;
        setStep(1, 'done');
        setStep(2, 'active');
      } catch (e) {
        setStatus(e.message, 'error');
      }
    });

    document.getElementById('btn-claim').addEventListener('click', async () => {
      if (!userAddress) return;
      const btn = document.getElementById('btn-claim');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Requesting...';

      try {
        // Step 1: Get challenge from server
        const challengeRes = await fetch(FAUCET_API + '/challenge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: userAddress }),
        });
        const challengeData = await challengeRes.json();
        if (!challengeRes.ok) throw new Error(challengeData.error || 'Failed to get challenge');

        // Step 2: Sign the challenge with wallet
        const signature = await call('octra_signMessage', [challengeData.challenge]);

        // Step 3: Submit to faucet server
        const claimRes = await fetch(FAUCET_API + '/claim', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            address: userAddress,
            challenge: challengeData.challenge,
            signature,
          }),
        });
        const claimData = await claimRes.json();
        if (!claimRes.ok) throw new Error(claimData.error || 'Claim failed');

        setStep(2, 'done');
        setStatus(`✓ Sent 3 OCT to your wallet!<br><a href="https://octrascan.io/tx/${claimData.txHash}" target="_blank">View transaction →</a>`, 'success');
        btn.textContent = 'Claimed ✓';
      } catch (e) {
        setStatus(e.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Claim 3 OCT';
      }
    });

    // Auto-detect wallet
    if (window.octra) {
      call('octra_accounts').then(accounts => {
        if (accounts && accounts.length > 0) {
          userAddress = accounts[0];
          document.getElementById('user-address').textContent = userAddress;
          document.getElementById('user-address').style.display = 'block';
          document.getElementById('btn-connect').textContent = 'Connected ✓';
          document.getElementById('btn-connect').disabled = true;
          document.getElementById('btn-claim').disabled = false;
          setStep(1, 'done');
          setStep(2, 'active');
        }
      }).catch(() => {});
    }
  </script>
</body>
</html>
