<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octane Announcement</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: url('./background.png') center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .graphic {
      text-align: center;
      padding: 80px 60px;
      max-width: 900px;
    }
    .badge {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #a0a8d0;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 8px 20px;
      margin-bottom: 32px;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.04);
    }
    .headline {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 3.2rem;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 24px;
      text-shadow: 0 4px 30px rgba(0, 0, 219, 0.4);
    }
    .headline .highlight {
      color: #8b7dff;
      text-shadow: 0 0 40px rgba(139, 125, 255, 0.6), 0 0 80px rgba(139, 125, 255, 0.3);
    }
    .sub {
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 1px;
      color: #c0c6e8;
      line-height: 1.8;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #6c63ff, transparent);
      margin: 28px auto;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 40px;
    }
    .logo-row img { width: 32px; height: 32px; border-radius: 6px; }
    .logo-row span {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 4px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="graphic">
    <div class="announcement">
      <div class="badge">New Integration</div>
      <h1 class="headline">
        <span class="highlight">zkTLS</span> is now supported<br>in Octane
      </h1>
      <div class="divider"></div>
      <p class="sub">Privacy-preserving identity for a private web.</p>
    </div>
    <div class="logo-row">
      <img src="./flame.svg" alt="Octane">
      <span>OCTANE</span>
    </div>
  </div>
</body>
</html>
